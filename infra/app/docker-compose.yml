services:
  wordpress:
    image: ${APP_IMAGE}
    container_name: wordpress_app
    restart: always
    env_file:
      - ../shared/app.env
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "9000"
    volumes:
      - wordpress_data:/var/www/html
      - wordpress_uploads:/var/www/html/wp-content/uploads
      - ../shared/wp-config-sample.php:/var/www/html/wp-config-sample.php:ro
    networks:
      - appnet

  mariadb:
    image: mariadb:10.11
    container_name: wordpress_mariadb
    restart: always
    env_file:
      - ../shared/compose.env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - appnet

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: wordpress_nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - wordpress_data:/var/www/html:ro
      - wordpress_uploads:/var/www/html/wp-content/uploads:ro
      - ../shared/ssl:/etc/nginx/ssl:ro
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mariadb_data:
    name: ${MARIADB_DATA_VOLUME:-wordpress_mariadb_data}
  wordpress_data:
    name: ${WORDPRESS_DATA_VOLUME:-wordpress_code_data}
  wordpress_uploads:
    name: ${WORDPRESS_UPLOADS_VOLUME:-wordpress_uploads_data}
